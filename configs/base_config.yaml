# Base configuration for event-based camera tracking project

project:
  name: event-based-cameras-tracking
  seed: 42

data:
  root_dir: data/
  raw_dir: data/raw/
  processed_dir: data/processed/
  batch_size: 16
  num_workers: 4
  time_window_us: 50000    # event accumulation window in microseconds
  height: 240
  width: 346

model:
  backbone: "event_resnet18"
  num_classes: 10
  pretrained: false
  pretrained_path: models/pretrained/

training:
  epochs: 100
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  lr_scheduler: "cosine"
  warmup_epochs: 5
  checkpoint_dir: models/checkpoints/
  log_dir: experiments/logs/

evaluation:
  iou_threshold: 0.5
  metrics: ["mAP", "MOTA", "IDF1"]
